version: 2

models:
  - name: stg_orders
    description: "원천 ORDERS 테이블의 표준화된 staging 뷰"
    columns:
      - name: order_id
        tests:
          - unique
          - not_null

      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id

      - name: order_status
        tests:
          - not_null
          - accepted_values:
              values: ['O', 'F', 'P']

      - name: order_total_price
        tests:
          - not_null

      - name: order_date
        tests:
          - not_null
